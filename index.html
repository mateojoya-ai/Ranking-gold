<!DOCTYPE html>
<html>
<head>
  <title>Ranking Truco Gold</title>

  <style>
    body {
      background: #020617;
      color: white;
      font-family: Arial;
      text-align: center;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .top1 {
      border: 3px solid gold;
      padding: 20px;
      margin: 20px;
      border-radius: 20px;
      font-size: 22px;
    }

    .top9 {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
    }

    .top9 div {
      border: 1px solid #444;
      padding: 10px;
      border-radius: 10px;
      width: 120px;
    }

    table {
      width: 100%;
      margin-top: 20px;
      border-collapse: collapse;
    }

    td {
      padding: 8px;
      border-bottom: 1px solid #333;
    }

    .whatsapp {
      background: #25D366;
      padding: 12px;
      border-radius: 10px;
      margin: 20px;
    }

    a { color: white; text-decoration: none; }
  </style>
</head>

<body>

<div class="container">

<h1>🏆 RANKING TRUCO GOLD</h1>

<div class="whatsapp">
<a href="https://chat.whatsapp.com/EcbHo1o9Rjv7YGV8s6zQi7?mode=gi_t">
👉 UNITE AL GRUPO
</a>
</div>

<div id="top1"></div>
<div class="top9" id="top9"></div>
<table id="tabla"></table>

</div>

<script>

let texto = `
PLE Dylan😉🤙 - 130
~CBraianj - 119
joaco Farias - 93
PLE Edu - 57
~Benja🫣 - 51
PLE 🥰🥰bauti - 46
PLE Enzoo - 43
CLT Nacho - 37
~Luis Carrizo💯 - 31
PLE Lauty B - 29
~thiago - 28
~Fran Ibañez - 27
~Martin 🍺 - 26
Lichu Lafe - 25
~Beenja - 25
PLE.Mario - 23
PLE ig - 20
PLE Exequiel Leandro Bazan - 18
yoel admin gold - 16
~Juann - 16
`;

let jugadores = texto.split("\n").map(linea => {
let partes = linea.split("-");
return {
nombre: partes[0]?.trim(),
puntos: parseInt(partes[1])
};
}).filter(j => j.nombre && j.puntos);

jugadores.sort((a,b)=>b.puntos-a.puntos);

// TOP 1
document.getElementById("top1").innerHTML =
`<div class="top1">🥇 ${jugadores[0].nombre} - ${jugadores[0].puntos} pts</div>`;

// TOP 2–9
for(let i=1;i<9 && i<jugadores.length;i++){
document.getElementById("top9").innerHTML +=
`<div>${i+1}°<br>${jugadores[i].nombre}<br>${jugadores[i].puntos}</div>`;
}

// RESTO
for(let i=9;i<jugadores.length;i++){
document.getElementById("tabla").innerHTML +=
`<tr><td>${i+1}</td><td>${jugadores[i].nombre}</td><td>${jugadores[i].puntos}</td></tr>`;
}

</script>

</body>
</html>
